services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vulnshop
      POSTGRES_PASSWORD: vulnshop_secret
      POSTGRES_DB: vulnshop
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnshop -d vulnshop"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  internal-api:
    build:
      context: ./services/internal-api
    expose:
      - "8080"

  metadata:
    build:
      context: ./services/metadata
    expose:
      - "8080"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://vulnshop:vulnshop_secret@db:5432/vulnshop
      JWT_SECRET: weak_lab_secret_change_me
      REDIS_URL: redis://redis:6379/0
      INTERNAL_API_URL: http://internal-api:8080
      METADATA_URL: http://metadata:8080
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      internal-api:
        condition: service_started
      metadata:
        condition: service_started
    command: >
      sh -c "python seed.py &&
      gunicorn --bind 0.0.0.0:5000 --workers 2 wsgi:app"
    expose:
      - "5000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "127.0.0.1:18080:80"
